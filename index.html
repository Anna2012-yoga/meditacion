function useAudio(){
  const ctxRef=useRef(null);
  const nodesRef=useRef([]);
  const getCtx=()=>{if(!ctxRef.current)ctxRef.current=new(window.AudioContext||window.webkitAudioContext)();return ctxRef.current;};
  const add=n=>nodesRef.current.push(n);
  const stopSound=()=>{nodesRef.current.forEach(n=>{try{n.stop?n.stop():n.disconnect();}catch(e){}});nodesRef.current=[];};
  const noise=(ctx,master,count,fFn,lFn)=>{
    for(let i=0;i<count;i++){
      const buf=ctx.createBuffer(1,ctx.sampleRate*2,ctx.sampleRate);
      const d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=Math.random()*2-1;
      const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
      const flt=ctx.createBiquadFilter();fFn(flt,i);
      const g=ctx.createGain();g.gain.value=0.12+Math.random()*0.08;
      if(lFn)lFn(ctx,g,i);
      src.connect(flt);flt.connect(g);g.connect(master);src.start(ctx.currentTime+i*0.07);add(src);
    }
  };
  const tone=(ctx,dest,freq,type,gv,dur,off=0)=>{
    const o=ctx.createOscillator();o.type=type;o.frequency.value=freq;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,ctx.currentTime+off);
    g.gain.linearRampToValueAtTime(gv,ctx.currentTime+off+0.3);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+off+dur);
    o.connect(g);g.connect(dest);o.start(ctx.currentTime+off);o.stop(ctx.currentTime+off+dur);add(o);
  };
  const loop=(fn,interval)=>{fn();const id=setInterval(fn,interval);add({stop:()=>clearInterval(id)});};
  const lfoMod=(ctx,g,i,fr,gv)=>{const l=ctx.createOscillator();l.frequency.value=fr+i*0.02;const lg=ctx.createGain();lg.gain.value=gv;l.connect(lg);lg.connect(g.gain);l.start();add(l);};

  const playSound=(type)=>{
    stopSound();
    const ctx=getCtx();
    const master=ctx.createGain();master.gain.setValueAtTime(0,ctx.currentTime);master.gain.linearRampToValueAtTime(0.35,ctx.currentTime+1.5);master.connect(ctx.destination);add(master);
    if(type==="rain")noise(ctx,master,8,(f,i)=>{f.type="bandpass";f.frequency.value=800+i*250;f.Q.value=0.4;});
    else if(type==="forest")noise(ctx,master,5,(f,i)=>{f.type="bandpass";f.frequency.value=400+i*150;f.Q.value=1;});
    else if(type==="ocean")noise(ctx,master,3,(f,i)=>{f.type="lowpass";f.frequency.value=300+i*100;f.Q.value=2;},(ctx,g,i)=>lfoMod(ctx,g,i,0.08,0.12));
    else if(type==="wind")noise(ctx,master,4,(f,i)=>{f.type="lowpass";f.frequency.value=180+i*70;f.Q.value=0.3;},(ctx,g,i)=>lfoMod(ctx,g,i,0.05,0.08));
    else if(type==="bowls"){const fr=[110,220,330,440,528,639];loop(()=>{const f=fr[Math.floor(Math.random()*fr.length)];tone(ctx,master,f,"sine",0.18,6+Math.random()*4);tone(ctx,master,f*2,"sine",0.06,4+Math.random()*3);},3500);}
    else if(type==="birds"){
      const bc=()=>{const b=800+Math.random()*600;const o=ctx.createOscillator();o.type="sine";o.frequency.setValueAtTime(b,ctx.currentTime);o.frequency.linearRampToValueAtTime(b*1.3,ctx.currentTime+0.1);o.frequency.linearRampToValueAtTime(b*0.9,ctx.currentTime+0.2);const g=ctx.createGain();g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(0.08,ctx.currentTime+0.05);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);o.connect(g);g.connect(master);o.start();o.stop(ctx.currentTime+0.3);add(o);};
      loop(bc,900+Math.random()*600);loop(bc,1400+Math.random()*800);
      noise(ctx,master,3,(f,i)=>{f.type="bandpass";f.frequency.value=300+i*100;f.Q.value=1.5;});
    }
    else if(type==="bells"){const bf=[523,659,784,1047,1319];loop(()=>{const f=bf[Math.floor(Math.random()*bf.length)];tone(ctx,master,f,"sine",0.1,3+Math.random()*2);tone(ctx,master,f*1.5,"sine",0.04,2+Math.random()*1.5);},2500+Math.random()*2000);}
    else if(type==="stream"){
      noise(ctx,master,6,(f,i)=>{f.type="bandpass";f.frequency.value=600+i*300;f.Q.value=0.6;},(ctx,g,i)=>lfoMod(ctx,g,i,2+i*1.5,0.07));
      loop(()=>{const o=ctx.createOscillator();o.type="sine";o.frequency.value=1200+Math.random()*800;const g=ctx.createGain();g.gain.setValueAtTime(0.06,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);o.connect(g);g.connect(master);o.start();o.stop(ctx.currentTime+0.15);add(o);},180+Math.random()*120);
    }
    else if(type==="om"){
      [1,2,3,4,5].forEach((h,i)=>{const o=ctx.createOscillator();o.type="sine";o.frequency.value=136.1*h;const g=ctx.createGain();g.gain.value=[0.25,0.12,0.08,0.05,0.03][i];const v=ctx.createOscillator();v.frequency.value=0.15+i*0.05;const vg=ctx.createGain();vg.gain.value=136.1*h*0.003;v.connect(vg);vg.connect(o.frequency);v.start();add(v);o.connect(g);g.connect(master);o.start();add(o);});
      const sl=ctx.createOscillator();sl.frequency.value=0.05;const sg=ctx.createGain();sg.gain.value=0.3;sl.connect(sg);sg.connect(master.gain);sl.start();add(sl);
    }
    else if(type==="ambient"){
      const sc=[261.6,293.7,329.6,392.0,440.0,523.3];
      loop(()=>{const root=sc[Math.floor(Math.random()*sc.length)];[root,root*1.25,root*1.5].forEach(f=>{const o=ctx.createOscillator();o.type="sine";o.frequency.value=f;const g=ctx.createGain();const dur=8+Math.random()*6;g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(0.08,ctx.currentTime+2);g.gain.setValueAtTime(0.08,ctx.currentTime+dur-2);g.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);const o2=ctx.createOscillator();o2.type="sine";o2.frequency.value=f*1.002;const g2=ctx.createGain();g2.gain.value=0.04;o2.connect(g2);g2.connect(master);o2.start();o2.stop(ctx.currentTime+dur);add(o2);o.connect(g);g.connect(master);o.start();o.stop(ctx.currentTime+dur);add(o);});},7000);
    }
    else if(type==="hz528"){
      [1,2,3].forEach((h,i)=>{const o=ctx.createOscillator();o.type="sine";o.frequency.value=528*h;const g=ctx.createGain();g.gain.value=[0.22,0.07,0.03][i];lfoMod(ctx,g,i,0.08,0.015);o.connect(g);g.connect(master);o.start();add(o);});
      const o2=ctx.createOscillator();o2.type="sine";o2.frequency.value=529;const g2=ctx.createGain();g2.gain.value=0.06;o2.connect(g2);g2.connect(master);o2.start();add(o2);
    }
    else if(type==="hz396"){
      [1,2,3,0.5].forEach((h,i)=>{const o=ctx.createOscillator();o.type="sine";o.frequency.value=396*h;const g=ctx.createGain();g.gain.value=[0.20,0.08,0.04,0.10][i];lfoMod(ctx,g,i,0.06,0.012);o.connect(g);g.connect(master);o.start();add(o);});
      const o3=ctx.createOscillator();o3.type="sine";o3.frequency.value=397;const g3=ctx.createGain();g3.gain.value=0.05;o3.connect(g3);g3.connect(master);o3.start();add(o3);
    }
  };
  return{playSound,stopSound};
}

function BreathCircle({running,phase,progress,scale,countdown,cycles,pat,t}){
  const R=90,CX=130,CY=130,circ=2*Math.PI*R;
  const col={inhale:"#4fc97a",hold:"#f0c060",exhale:"#60a8f0",ready:"#7a8a7a"}[phase]||"#7a8a7a";
  const label=phase==="inhale"?t.inhale:phase==="hold"?t.hold:phase==="exhale"?t.exhale:"";
  const getSeq=p=>{const s=[{id:"inhale",dur:p.inhale},{id:"exhale",dur:p.exhale}];if(p.hold>0)s.splice(1,0,{id:"hold",dur:p.hold});return s;};
  const seq=getSeq(pat);
  const pR=60+scale*55;
  const particles=Array.from({length:8},(_,i)=>{const a=(i/8)*2*Math.PI;return{x:CX+pR*Math.cos(a),y:CY+pR*Math.sin(a)};});
  const tDur=phase==="inhale"?pat.inhale:phase==="exhale"?pat.exhale:0.3;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      <svg width="260" height="260" viewBox="0 0 260 260" style={{marginBottom:"0.75rem"}}>
        <defs>
          <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor={col} stopOpacity="0.12"/>
            <stop offset="100%" stopColor={col} stopOpacity="0"/>
          </radialGradient>
          <filter id="sf"><feGaussianBlur stdDeviation="5"/></filter>
        </defs>
        <circle cx={CX} cy={CY} r="120" fill="url(#bg2)"/>
        <circle cx={CX} cy={CY} r={R} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="3"/>
        <circle cx={CX} cy={CY} r={R} fill="none" stroke={col} strokeWidth="3"
          strokeDasharray={circ} strokeDashoffset={circ*(1-progress)} strokeLinecap="round"
          transform={`rotate(-90 ${CX} ${CY})`} style={{transition:"stroke 0.5s"}}/>
        {running&&particles.map((p,i)=>(
          <circle key={i} cx={p.x} cy={p.y} r={2+scale*2} fill={col} opacity={0.25+scale*0.4}/>
        ))}
        <circle cx={CX} cy={CY} r={22+scale*62} fill="none" stroke={col} strokeWidth="1.5" opacity="0.3" style={{transition:`r ${tDur}s ease-in-out,stroke 0.5s`}}/>
        <circle cx={CX} cy={CY} r={20+scale*60} fill={col} opacity="0.09" style={{transition:`r ${tDur}s ease-in-out,fill 0.5s`}}/>
        <circle cx={CX} cy={CY} r={14+scale*36} fill={col} opacity="0.18" filter="url(#sf)" style={{transition:`r ${tDur}s ease-in-out,fill 0.5s`}}/>
        <text x={CX} y={CY-10} textAnchor="middle" fontSize="26" style={{userSelect:"none"}}>🌿</text>
        <text x={CX} y={CY+14} textAnchor="middle" fontSize="13" fill={col} letterSpacing="2" fontFamily="Georgia,serif">{label.toUpperCase()}</text>
        {running&&countdown>0&&<text x={CX} y={CY+32} textAnchor="middle" fontSize="12" fill="#7aaa8a" fontFamily="Georgia,serif">{countdown}с</text>}
        {cycles>0&&<text x={CX} y={CY+50} textAnchor="middle" fontSize="10" fill="rgba(170,200,170,0.4)" fontFamily="Georgia,serif">{cycles} {t.cycles}</text>}
      </svg>
      <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:"0.5rem"}}>
        {seq.map((s,i)=>(
          <div key={i} style={{textAlign:"center",opacity:phase===s.id?1:0.35,transition:"opacity 0.4s"}}>
            <div style={{width:8,height:8,borderRadius:"50%",margin:"0 auto 3px",background:s.id==="inhale"?"#4fc97a":s.id==="hold"?"#f0c060":"#60a8f0",boxShadow:phase===s.id?`0 0 6px ${s.id==="inhale"?"#4fc97a":s.id==="hold"?"#f0c060":"#60a8f0"}`:"none"}}/>
            <div style={{fontSize:10,color:"#7aaa8a"}}>{s.id==="inhale"?t.inhale:s.id==="hold"?t.hold:t.exhale}</div>
            <div style={{fontSize:11,color:"#a8d5b5"}}>{s.dur}с</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const[lang,setLang]=useState("ru");
  const[screen,setScreen]=useState("home");
  const[selDur,setSelDur]=useState(1);
  const[activeSound,setActiveSound]=useState(null);
  const[selPat,setSelPat]=useState(0);
  const[running,setRunning]=useState(false);
  const[timeLeft,setTimeLeft]=useState(0);
  const[breathPhase,setBreathPhase]=useState("ready");
  const[breathProgress,setBreathProgress]=useState(0);
  const[breathScale,setBreathScale]=useState(0.4);
  const[countdown,setCountdown]=useState(0);
  const[cycles,setCycles]=useState(0);
  const[streak,setStreak]=useState(3);
  const[sessionsToday,setSessionsToday]=useState(1);
  const timerRef=useRef(null);
  const rafRef=useRef(null);
  const stateRef=useRef({});
  const{playSound,stopSound}=useAudio();
  const t=T[lang];
  const quoteRef=useRef(T.ru.quotes[0]);
  useEffect(()=>{quoteRef.current=t.quotes[Math.floor(Math.random()*t.quotes.length)];},[lang]);

  useEffect(()=>{
    if(running){timerRef.current=setInterval(()=>{setTimeLeft(v=>{if(v<=1){clearInterval(timerRef.current);setRunning(false);setScreen("done");return 0;}return v-1;});},1000);}
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[running]);

  const runBreath=(phaseIdx,cyc)=>{
    const pat=BREATH_PATTERNS[selPat];
    const seq=[{id:"inhale",dur:pat.inhale},{id:"exhale",dur:pat.exhale}];
    if(pat.hold>0)seq.splice(1,0,{id:"hold",dur:pat.hold});
    if(phaseIdx>=seq.length){runBreath(0,cyc+1);return;}
    const cur=seq[phaseIdx];
    stateRef.current={id:cur.id,start:performance.now(),duration:cur.dur*1000,phaseIdx,cyc};
    setBreathPhase(cur.id);setCycles(cyc);
    const tick=(now)=>{
      const el=now-stateRef.current.start;
      const p=Math.min(el/stateRef.current.duration,1);
      setBreathProgress(p);setCountdown(Math.ceil((stateRef.current.duration-el)/1000));
      setBreathScale(cur.id==="inhale"?0.4+p*0.6:cur.id==="hold"?1:1-p*0.6);
      if(p<1)rafRef.current=requestAnimationFrame(tick);
      else if(stateRef.current.id===cur.id)runBreath(phaseIdx+1,stateRef.current.cyc);
    };
    rafRef.current=requestAnimationFrame(tick);
  };

  const startSession=()=>{
    setTimeLeft(SESSIONS[selDur].seconds);
    setBreathPhase("inhale");setBreathProgress(0);setBreathScale(0.4);setCycles(0);
    setScreen("session");setRunning(true);
    if(activeSound!==null)playSound(SOUND_DEFS[activeSound].type);
    runBreath(0,0);
  };
  const stopSession=()=>{
    setRunning(false);stopSound();cancelAnimationFrame(rafRef.current);
    setBreathPhase("ready");setBreathProgress(0);setBreathScale(0.4);setScreen("home");
  };
  useEffect(()=>()=>{cancelAnimationFrame(rafRef.current);},[]);

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const total=SESSIONS[selDur].seconds,prog=timeLeft/total;
  const r=100,circ=2*Math.PI*r;

  const bg={minHeight:"100vh",background:"linear-gradient(160deg,#0d1f1a 0%,#0a1520 60%,#0d1a0d 100%)",display:"flex",flexDirection:"column",alignItems:"center",padding:"0 1rem 2rem"};

  const LangBar=()=>(
    <div style={{display:"flex",gap:6,marginBottom:"1.25rem",flexWrap:"wrap",justifyContent:"center"}}>
      {Object.entries(LANGS).map(([code,{flag,name}])=>(
        <button key={code} onClick={()=>setLang(code)} style={{padding:"0.3rem 0.7rem",borderRadius:20,border:`1.5px solid ${lang===code?"#4a8a5a":"rgba(255,255,255,0.15)"}`,background:lang===code?"rgba(74,138,90,0.25)":"rgba(255,255,255,0.04)",color:lang===code?"#a8d5b5":"#7aaa8a",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
          <span>{flag}</span><span>{name}</span>
        </button>
      ))}
    </div>
  );

  if(screen==="home")return(
    <div style={bg}>
      <div style={{width:"100%",maxWidth:440,paddingTop:"2rem"}}>
        <LangBar/>
        <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
          <div style={{fontSize:40,marginBottom:8}}>🌿</div>
          <h1 style={{fontSize:28,fontWeight:400,color:"#a8d5b5",margin:0,letterSpacing:2}}>{t.appName}</h1>
          <p style={{fontSize:13,color:"#7aaa8a",margin:"6px 0 0",letterSpacing:1}}>{t.appSub}</p>
        </div>
        <div style={{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:"1rem 1.25rem",marginBottom:"1.25rem",borderLeft:"3px solid #4a8a5a"}}>
          <p style={{margin:0,fontSize:14,color:"#c4ddc8",fontStyle:"italic",lineHeight:1.6}}>"{quoteRef.current}"</p>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:"1.25rem"}}>
          {[{n:streak,l:t.streak,i:"🔥"},{n:sessionsToday,l:t.sessionsToday,i:"🧘"}].map((s,i)=>(
            <div key={i} style={{flex:1,background:"rgba(255,255,255,0.06)",borderRadius:12,padding:"0.75rem",textAlign:"center"}}>
              <div style={{fontSize:22}}>{s.i}</div>
              <div style={{fontSize:20,fontWeight:600,color:"#a8d5b5"}}>{s.n}</div>
              <div style={{fontSize:11,color:"#7aaa8a",marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{marginBottom:"1.25rem"}}>
          <p style={{fontSize:12,color:"#7aaa8a",marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>{t.duration}</p>
          <div style={{display:"flex",gap:8}}>
            {SESSIONS.map((s,i)=>(
              <button key={i} onClick={()=>setSelDur(i)} style={{flex:1,padding:"0.6rem 0",borderRadius:10,border:`1.5px solid ${i===selDur?"#4a8a5a":"rgba(255,255,255,0.12)"}`,background:i===selDur?"rgba(74,138,90,0.25)":"rgba(255,255,255,0.04)",color:i===selDur?"#a8d5b5":"#7aaa8a",fontSize:13}}>{s.label}</button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:"1.25rem"}}>
          <p style={{fontSize:12,color:"#7aaa8a",marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>{t.pattern}</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {BREATH_PATTERNS.map((p,i)=>(
              <button key={i} onClick={()=>setSelPat(i)} style={{padding:"0.45rem 0.8rem",borderRadius:10,border:`1.5px solid ${i===selPat?"#4a8a5a":"rgba(255,255,255,0.12)"}`,background:i===selPat?"rgba(74,138,90,0.25)":"rgba(255,255,255,0.04)",color:i===selPat?"#a8d5b5":"#7aaa8a",fontSize:12}}>{p.name}</button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:"1.75rem"}}>
          <p style={{fontSize:12,color:"#7aaa8a",marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>{t.sound}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
            {SOUND_DEFS.map((sd,i)=>(
              <button key={i} onClick={()=>setActiveSound(activeSound===i?null:i)} style={{padding:"0.55rem 0.75rem",borderRadius:10,border:`1.5px solid ${activeSound===i?"#4a8a5a":"rgba(255,255,255,0.12)"}`,background:activeSound===i?"rgba(74,138,90,0.25)":"rgba(255,255,255,0.04)",color:activeSound===i?"#a8d5b5":"#7aaa8a",fontSize:13,display:"flex",alignItems:"center",gap:8}}>
                <span>{sd.icon}</span><span>{t.sounds[i]}</span>
                {activeSound===i&&<span style={{marginLeft:"auto",fontSize:10,color:"#4a8a5a"}}>✓</span>}
              </button>
            ))}
          </div>
        </div>
        <button onClick={startSession} style={{width:"100%",padding:"1rem",borderRadius:14,background:"linear-gradient(135deg,#2d6a4f,#1b4332)",color:"#a8d5b5",fontSize:16,letterSpacing:2,textTransform:"uppercase"}}>{t.start}</button>
      </div>
    </div>
  );

  if(screen==="session")return(
    <div style={bg}>
      <div style={{width:"100%",maxWidth:440,paddingTop:"1.5rem",display:"flex",flexDirection:"column",alignItems:"center"}}>
        <LangBar/>
        <p style={{fontSize:11,color:"#7aaa8a",letterSpacing:2,textTransform:"uppercase",marginBottom:"1rem"}}>
          {SESSIONS[selDur].label} · {activeSound!==null?t.sounds[activeSound]:t.silence} · {BREATH_PATTERNS[selPat].name}
        </p>
        <div style={{position:"relative",width:230,height:230,marginBottom:"0.5rem"}}>
          <svg width="230" height="230" style={{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}}>
            <circle cx="115" cy="115" r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="3"/>
            <circle cx="115" cy="115" r={r} fill="none" stroke="rgba(74,138,90,0.6)" strokeWidth="3"
              strokeDasharray={circ} strokeDashoffset={circ*(1-prog)} strokeLinecap="round"
              style={{transition:"stroke-dashoffset 1s linear"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:32,color:"#c4ddc8",letterSpacing:2}}>{fmt(timeLeft)}</span>
          </div>
        </div>
        <BreathCircle running={running} phase={breathPhase} progress={breathProgress} scale={breathScale} countdown={countdown} cycles={cycles} pat={BREATH_PATTERNS[selPat]} t={t}/>
        <div style={{display:"flex",gap:16,marginTop:"1rem"}}>
          <button onClick={()=>setRunning(r=>!r)} style={{padding:"0.7rem 1.5rem",borderRadius:10,border:"1.5px solid rgba(74,138,90,0.5)",background:"rgba(74,138,90,0.15)",color:"#a8d5b5",fontSize:14}}>{running?t.pause:t.resume}</button>
          <button onClick={stopSession} style={{padding:"0.7rem 1.5rem",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.05)",color:"#7aaa8a",fontSize:14}}>{t.stop}</button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={bg}>
      <div style={{width:"100%",maxWidth:440,paddingTop:"3rem",textAlign:"center"}}>
        <LangBar/>
        <div style={{fontSize:56,marginBottom:"1rem"}}>✨</div>
        <h2 style={{fontSize:24,fontWeight:400,color:"#a8d5b5",margin:"0 0 8px",letterSpacing:2}}>{t.done}</h2>
        <p style={{color:"#7aaa8a",fontSize:14,marginBottom:"2rem"}}>{t.doneDesc} {SESSIONS[selDur].label}</p>
        <div style={{background:"rgba(74,138,90,0.15)",borderRadius:16,padding:"1.25rem",marginBottom:"2rem",border:"1.5px solid rgba(74,138,90,0.3)"}}>
          <div style={{fontSize:32,color:"#a8d5b5",fontWeight:600}}>{streak+1}</div>
          <div style={{fontSize:13,color:"#7aaa8a",marginTop:4}}>{t.doneStreak} 🔥</div>
        </div>
        <p style={{fontSize:14,color:"#c4ddc8",fontStyle:"italic",marginBottom:"2.5rem",lineHeight:1.7}}>"{t.doneQuote}"</p>
        <button onClick={()=>{setStreak(s=>s+1);setSessionsToday(s=>s+1);setScreen("home");}} style={{width:"100%",padding:"1rem",borderRadius:14,background:"linear-gradient(135deg,#2d6a4f,#1b4332)",color:"#a8d5b5",fontSize:15,letterSpacing:2,textTransform:"uppercase"}}>{t.back}</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
